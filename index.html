<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Color Blindness Simulator</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f9;margin:0}
header{background:#2563eb;color:#fff;padding:16px;text-align:center}
.container{max-width:900px;margin:20px auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}
button{padding:10px 14px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
button:hover{background:#1d4ed8}
canvas{max-width:100%;border:1px solid #ccc;border-radius:8px}
</style>
</head>
<body>
<header><h2>Color Blindness Simulator</h2></header>
<div class="container">
<input type="file" id="upload" accept="image/*">
<div class="controls">
<button onclick="applyFilter('original')">Original</button>
<button onclick="applyFilter('protanopia')">Protanopia</button>
<button onclick="applyFilter('deuteranopia')">Deuteranopia</button>
<button onclick="applyFilter('tritanopia')">Tritanopia</button>
<button onclick="applyFilter('achromatopsia')">Achromatopsia</button>
<button onclick="downloadImage()">Download</button>
</div>
<canvas id="canvas"></canvas>
</div>
<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let originalData=null;

document.getElementById("upload").addEventListener("change",e=>{
 const file=e.target.files[0];
 if(!file)return;
 const img=new Image();
 img.onload=()=>{
   canvas.width=img.width;
   canvas.height=img.height;
   ctx.drawImage(img,0,0);
   originalData=ctx.getImageData(0,0,canvas.width,canvas.height);
 };
 img.src=URL.createObjectURL(file);
});

const matrices={
protanopia:[[0.567,0.433,0],[0.558,0.442,0],[0,0.242,0.758]],
deuteranopia:[[0.625,0.375,0],[0.7,0.3,0],[0,0.3,0.7]],
tritanopia:[[0.95,0.05,0],[0,0.433,0.567],[0,0.475,0.525]],
achromatopsia:[[0.299,0.587,0.114],[0.299,0.587,0.114],[0.299,0.587,0.114]]
};

function applyFilter(type){
 if(!originalData)return;
 if(type==="original"){
   ctx.putImageData(originalData,0,0);
   return;
 }
 const img=new ImageData(new Uint8ClampedArray(originalData.data),originalData.width,originalData.height);
 const d=img.data,m=matrices[type];
 for(let i=0;i<d.length;i+=4){
   let r=d[i],g=d[i+1],b=d[i+2];
   d[i]=Math.min(255,r*m[0][0]+g*m[0][1]+b*m[0][2]);
   d[i+1]=Math.min(255,r*m[1][0]+g*m[1][1]+b*m[1][2]);
   d[i+2]=Math.min(255,r*m[2][0]+g*m[2][1]+b*m[2][2]);
 }
 ctx.putImageData(img,0,0);
}
function downloadImage(){
 const a=document.createElement("a");
 a.download="simulated-image.png";
 a.href=canvas.toDataURL("image/png");
 a.click();
}
</script>
</body>
</html>
